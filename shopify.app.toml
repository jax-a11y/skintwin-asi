# Shopify App configuration for SkinTwin-ASI
# https://shopify.dev/docs/apps/tools/cli/configuration

name = "SkinTwin ASI"
client_id = "{{ SHOPIFY_API_KEY }}"
application_url = "{{ HOST }}"
embedded = true

[access_scopes]
# Scopes required for skincare product analysis, customer profiles, and recommendations
scopes = "read_products,write_products,read_customers,write_customers,read_orders,read_product_listings"

[auth]
redirect_urls = [
  "{{ HOST }}/api/auth/callback"
]

[webhooks]
api_version = "2024-10"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/api/webhooks/app-uninstalled"

  [[webhooks.subscriptions]]
  topics = ["products/create", "products/update"]
  uri = "/api/webhooks/products"

  [[webhooks.subscriptions]]
  topics = ["customers/create", "customers/update"]
  uri = "/api/webhooks/customers"

[pos]
embedded = false
