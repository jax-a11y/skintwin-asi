# Full E2E Test Suite — Multi-browser matrix
#
# Runs exhaustive E2E tests across all supported browsers.
# Triggered on main branch push or manually via workflow_dispatch.

name: Full E2E Tests

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      browsers:
        description: 'Browsers to test (comma-separated: chromium,firefox,webkit)'
        required: false
        default: 'chromium,firefox,webkit'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  CI: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Matrix E2E tests
  # ─────────────────────────────────────────────────────────────────────────────
  e2e-matrix:
    name: E2E - ${{ matrix.browser }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Copy CI environment
        run: cp .env.ci .env.local

      - name: Install Playwright browsers
        run: npx playwright install ${{ matrix.browser }} --with-deps

      - name: Run E2E tests - ${{ matrix.browser }}
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          TZ: UTC

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results-${{ matrix.browser }}
          path: |
            playwright-report/
            e2e-results/
          retention-days: 14

      - name: Upload traces on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: traces-${{ matrix.browser }}
          path: e2e-results/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Accessibility tests
  # ─────────────────────────────────────────────────────────────────────────────
  e2e-a11y:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Copy CI environment
        run: cp .env.ci .env.local

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run accessibility tests
        run: npx playwright test --project=a11y
        env:
          TZ: UTC

      - name: Upload a11y results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: a11y-results
          path: |
            playwright-report/
            e2e-results/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────────
  # Responsive tests
  # ─────────────────────────────────────────────────────────────────────────────
  e2e-responsive:
    name: Responsive Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        project: [mobile-chrome, tablet]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Copy CI environment
        run: cp .env.ci .env.local

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run responsive tests - ${{ matrix.project }}
        run: npx playwright test --project=${{ matrix.project }}
        env:
          TZ: UTC

      - name: Upload responsive results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: responsive-results-${{ matrix.project }}
          path: |
            playwright-report/
            e2e-results/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────────
  # Summary job
  # ─────────────────────────────────────────────────────────────────────────────
  summary:
    name: E2E Summary
    runs-on: ubuntu-latest
    needs: [e2e-matrix, e2e-a11y, e2e-responsive]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-results

      - name: Generate summary
        run: |
          echo "## E2E Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Chromium | ${{ needs.e2e-matrix.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Firefox | ${{ needs.e2e-matrix.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| WebKit | ${{ needs.e2e-matrix.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Accessibility | ${{ needs.e2e-a11y.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Responsive | ${{ needs.e2e-responsive.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
