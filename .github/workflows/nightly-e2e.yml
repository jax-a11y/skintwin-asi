# Nightly E2E Tests — Scheduled exhaustive testing
#
# Runs complete E2E suite nightly or on manual trigger.
# Includes optional real Shopify integration smoke tests.

name: Nightly E2E

on:
  schedule:
    # Run at 3:00 AM UTC every day
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      run_shopify_integration:
        description: 'Run Shopify integration tests (requires secrets)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: nightly-e2e
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  CI: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Full E2E suite (mocked mode)
  # ─────────────────────────────────────────────────────────────────────────────
  e2e-nightly:
    name: Nightly E2E - All Browsers
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        shard: [1, 2]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Copy CI environment
        run: cp .env.ci .env.local

      - name: Install Playwright browsers
        run: npx playwright install ${{ matrix.browser }} --with-deps

      - name: Run E2E tests
        run: npx playwright test --project=${{ matrix.browser }} --shard=${{ matrix.shard }}/2
        env:
          TZ: UTC

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-results-${{ matrix.browser }}-shard${{ matrix.shard }}
          path: |
            playwright-report/
            e2e-results/
          retention-days: 30

      - name: Upload traces on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: nightly-traces-${{ matrix.browser }}-shard${{ matrix.shard }}
          path: e2e-results/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────────
  # Real Shopify integration smoke (optional, gated by secrets)
  # ─────────────────────────────────────────────────────────────────────────────
  shopify-integration:
    name: Shopify Integration Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.event.inputs.run_shopify_integration == 'true' || github.event_name == 'schedule' }}
    environment: shopify-integration
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Check for required secrets
        run: |
          if [ -z "${{ secrets.SHOPIFY_API_KEY }}" ]; then
            echo "⚠️ SHOPIFY_API_KEY not configured - skipping integration tests"
            exit 0
          fi

      - name: Setup real Shopify environment
        if: ${{ secrets.SHOPIFY_API_KEY != '' }}
        run: |
          cat > .env.local << EOF
          SHOPIFY_API_KEY=${{ secrets.SHOPIFY_API_KEY }}
          SHOPIFY_API_SECRET=${{ secrets.SHOPIFY_API_SECRET }}
          NEXT_PUBLIC_SHOPIFY_API_KEY=${{ secrets.SHOPIFY_API_KEY }}
          SCOPES=${{ secrets.SHOPIFY_SCOPES }}
          HOST=${{ secrets.SHOPIFY_HOST }}
          SESSION_STORAGE=memory
          NODE_ENV=test
          EOF

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run integration smoke tests
        if: ${{ secrets.SHOPIFY_API_KEY != '' }}
        run: npm run test:e2e:smoke
        env:
          TZ: UTC
          SHOPIFY_TEST_SHOP: ${{ secrets.SHOPIFY_TEST_SHOP }}

      - name: Upload integration results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: shopify-integration-results
          path: |
            playwright-report/
            e2e-results/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # Nightly summary
  # ─────────────────────────────────────────────────────────────────────────────
  nightly-summary:
    name: Nightly Summary
    runs-on: ubuntu-latest
    needs: [e2e-nightly]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## 🌙 Nightly E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Browser | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| All Browsers (Sharded) | ${{ needs.e2e-nightly.result == 'success' && '✅ All Passed' || '⚠️ Some Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Full results available in workflow artifacts." >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        run: |
          echo "::warning::Nightly E2E tests failed. Review artifacts for details."
